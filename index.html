<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>폴의 별빛 초원</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='52'%3E%E2%AD%90%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main id="idleRpgApp" class="phone-shell" aria-label="폴의 별빛 초원 MVP UI">
      <section class="game-screen">
        <header class="top-hud" aria-label="재화와 메뉴">
          <div class="resource-chip dust">
            <span class="chip-icon" aria-hidden="true">★</span>
            <span class="chip-copy">
              <strong>별가루</strong>
              <b id="starDustValue">0</b>
            </span>
            <button class="icon-button small" type="button" aria-label="별가루 상점">+</button>
          </div>

          <div class="resource-chip crystal">
            <span class="chip-icon gem" aria-hidden="true">◆</span>
            <span class="chip-copy">
              <strong>별수정</strong>
              <b id="starCrystalValue">0</b>
            </span>
            <button class="icon-button small" type="button" aria-label="별수정 상점">+</button>
          </div>

          <div class="hud-actions">
            <button class="icon-button" type="button" aria-label="우편함">✉</button>
            <button id="settingsButton" class="icon-button" type="button" aria-label="설정">⚙</button>
          </div>
        </header>

        <section class="stage-card" aria-label="스테이지 정보">
          <div class="stage-title-row">
            <span aria-hidden="true">★</span>
            <h1 id="stageTitle">별빛 초원 1-1</h1>
            <span aria-hidden="true">★</span>
          </div>
          <div class="stage-progress-row">
            <div class="stage-progress" aria-hidden="true">
              <i id="stageProgressFill"></i>
            </div>
            <strong id="stageProgressLabel">1/10</strong>
            <span class="boss-marker" aria-hidden="true">🐻</span>
          </div>
        </section>

        <section id="battlefield" class="battlefield" aria-label="자동 전투 미리보기">
          <div class="sky-star star-a"></div>
          <div class="sky-star star-b"></div>
          <div class="planet planet-a"></div>
          <div class="planet planet-b"></div>
          <aside class="boss-count-card">
            <span>보스까지</span>
            <strong id="bossCountdown">9</strong>
          </aside>

          <div class="combatant paul">
            <div class="hp-bar player-hp" aria-label="폴 체력">
              <i style="width: 96%"></i>
            </div>
            <div class="paul-sprite" role="img" aria-label="별 머리 마법사 폴"></div>
          </div>

          <div class="projectile-trail" aria-hidden="true">
            <i></i>
            <b class="projectile-sprite"></b>
          </div>

          <div class="damage-number" aria-hidden="true">5,872</div>

          <div class="combatant monster">
            <div class="hp-bar monster-hp" aria-label="몬스터 체력">
              <i style="width: 78%"></i>
            </div>
            <div class="monster-sprite" role="img" aria-label="초원 슬라임 몬스터"></div>
          </div>
        </section>

        <section id="skillBar" class="skill-bar" aria-label="자동 스킬 슬롯">
          <button class="skill-card" type="button">
            <strong>평타</strong>
            <span class="skill-icon bolt" aria-hidden="true"></span>
            <em><i style="width: 28%"></i>0.6초</em>
          </button>
          <button class="skill-card" type="button">
            <strong>스킬1</strong>
            <span class="skill-icon burst" aria-hidden="true"></span>
            <em><i style="width: 74%"></i>4.3초</em>
          </button>
          <button class="skill-card" type="button">
            <strong>스킬2</strong>
            <span class="skill-icon shield" aria-hidden="true"></span>
            <em><i style="width: 68%"></i>7.1초</em>
          </button>
          <button class="skill-card" type="button">
            <strong>궁극기</strong>
            <span class="skill-icon comet" aria-hidden="true"></span>
            <em class="gold"><i style="width: 18%"></i>24.8초</em>
          </button>
        </section>

        <section class="upgrade-panel" aria-label="강화">
          <div id="offlineNotice" class="notice hidden" role="status"></div>
          <div id="upgradeList" class="upgrade-list"></div>
        </section>

        <nav id="bottomNav" class="bottom-nav" aria-label="하단 메뉴">
          <button type="button" class="nav-item" data-tab="battle">
            <span aria-hidden="true">🪄</span>
            <strong>전투</strong>
          </button>
          <button type="button" class="nav-item active" data-tab="upgrade">
            <span aria-hidden="true">⬆</span>
            <strong>강화</strong>
          </button>
          <button type="button" class="nav-item locked" data-tab="equipment">
            <span aria-hidden="true">🎒</span>
            <strong>장비</strong>
          </button>
          <button type="button" class="nav-item locked" data-tab="workshop">
            <span aria-hidden="true">⚗</span>
            <strong>공방</strong>
          </button>
          <button type="button" class="nav-item locked" data-tab="shop">
            <span aria-hidden="true">🏪</span>
            <strong>상점</strong>
          </button>
        </nav>
      </section>
    </main>

    <script src="./src/game.bundle.js"></script>
  </body>
</html>
